    response_schema: "{ success: true }"

  - name: "add_issues_to_sprint"
    method: "POST"
    path: "/api/sprints/{sprint_id}/issues"
    description: "Move issues into a sprint"
    request_schema: "{ issue_keys: string[] }"
    response_schema: "{ success: true, moved_count: int }"

  - name: "remove_issues_from_sprint"
    method: "POST"
    path: "/api/sprints/{sprint_id}/issues/remove"
