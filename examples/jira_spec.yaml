name: "JiraClone - Project Management Platform"
description: >
  A full-featured project management and issue tracking platform inspired by Jira.
  Supports agile boards (Scrum & Kanban), backlog management, sprint planning,
  epics, stories, tasks, bugs, sub-tasks, workflows, permissions, dashboards,
  reporting, integrations, and real-time collaboration. Built with a Python
  FastAPI backend and a React TypeScript frontend.

language: "python"
framework: "fastapi"

# =============================================================================
# AUTHENTICATION & AUTHORIZATION ENDPOINTS
# =============================================================================
endpoints:

  # ── Auth ───────────────────────────────────────────────────────────────────
  - name: "register"
    method: "POST"
    path: "/api/auth/register"
    description: "Register a new user account"
    request_schema: >
      {
        email: string,
        password: string,
        display_name: string,
        avatar_url?: string
      }
    response_schema: >
      {
        user: { id, email, display_name, avatar_url, created_at },
        access_token: string,
        refresh_token: string
      }

  - name: "login"
    method: "POST"
    path: "/api/auth/login"
    description: "Authenticate user and return JWT tokens"
    request_schema: "{ email: string, password: string }"
    response_schema: >
      {
        user: { id, email, display_name, avatar_url, role },
        access_token: string,
        refresh_token: string
      }

  - name: "logout"
    method: "POST"
    path: "/api/auth/logout"
    description: "Invalidate the current session and refresh token"
    request_schema: "{ refresh_token: string }"
    response_schema: "{ success: true }"

  - name: "refresh_token"
    method: "POST"
    path: "/api/auth/refresh"
    description: "Exchange a valid refresh token for a new access token"
    request_schema: "{ refresh_token: string }"
    response_schema: "{ access_token: string, refresh_token: string }"

  - name: "forgot_password"
    method: "POST"
    path: "/api/auth/forgot-password"
    description: "Send a password reset email"
    request_schema: "{ email: string }"
    response_schema: "{ message: 'Reset email sent if account exists' }"

  - name: "reset_password"
    method: "POST"
    path: "/api/auth/reset-password"
    description: "Reset password using a token from the email"
    request_schema: "{ token: string, new_password: string }"
    response_schema: "{ success: true }"

  - name: "oauth_callback"
    method: "GET"
    path: "/api/auth/oauth/{provider}/callback"
    description: "OAuth2 callback for Google, GitHub, Microsoft, Atlassian SSO"
    request_schema: "Query params: ?code=string&state=string"
    response_schema: "Redirect to frontend with tokens in URL fragment"

  # ── Users ──────────────────────────────────────────────────────────────────
  - name: "get_current_user"
    method: "GET"
    path: "/api/users/me"
    description: "Return the currently authenticated user's profile"
    request_schema: "Bearer token in Authorization header"
    response_schema: >
      {
        id, email, display_name, avatar_url, role, timezone,
        notification_preferences, created_at
      }

  - name: "update_current_user"
    method: "PATCH"
    path: "/api/users/me"
    description: "Update the authenticated user's profile"
    request_schema: >
      {
        display_name?: string,
        avatar_url?: string,
        timezone?: string,
        notification_preferences?: NotificationPreferences
      }
    response_schema: "{ user: User }"

  - name: "list_users"
    method: "GET"
    path: "/api/users"
    description: "List all users in the organization (admin/project-scoped)"
    request_schema: "Query params: ?search=string&role=admin|member|viewer&page=int&per_page=int"
    response_schema: "{ users: User[], total: int, page: int, per_page: int }"

  - name: "get_user"
    method: "GET"
    path: "/api/users/{user_id}"
    description: "Get a user's public profile"
    request_schema: "Path param: user_id (uuid)"
    response_schema: "{ user: User }"

  - name: "deactivate_user"
    method: "POST"
    path: "/api/users/{user_id}/deactivate"
    description: "Deactivate a user account (admin only)"
    request_schema: "Path param: user_id"
    response_schema: "{ success: true }"

  - name: "upload_avatar"
    method: "POST"
    path: "/api/users/me/avatar"
    description: "Upload a new avatar image"
    request_schema: "multipart/form-data: file (image/png, image/jpeg, max 5MB)"
    response_schema: "{ avatar_url: string }"

  # ── Organizations / Workspaces ─────────────────────────────────────────────
  - name: "create_organization"
    method: "POST"
    path: "/api/organizations"
    description: "Create a new organization (workspace)"
    request_schema: >
      {
        name: string,
        slug: string,
        description?: string,
        logo_url?: string
      }
    response_schema: "{ organization: Organization }"

  - name: "list_organizations"
    method: "GET"
    path: "/api/organizations"
    description: "List all organizations the user belongs to"
    request_schema: "None"
    response_schema: "{ organizations: Organization[] }"

  - name: "get_organization"
    method: "GET"
    path: "/api/organizations/{org_id}"
    description: "Get organization details"
    request_schema: "Path param: org_id"
    response_schema: "{ organization: Organization }"

  - name: "update_organization"
    method: "PATCH"
    path: "/api/organizations/{org_id}"
    description: "Update organization settings"
    request_schema: >
      {
        name?: string,
        description?: string,
        logo_url?: string,
        default_timezone?: string,
        settings?: OrgSettings
      }
    response_schema: "{ organization: Organization }"

  - name: "delete_organization"
    method: "DELETE"
    path: "/api/organizations/{org_id}"
    description: "Delete organization and all associated data (owner only)"
    request_schema: "{ confirmation: string }"
    response_schema: "{ success: true }"

  - name: "invite_member"
    method: "POST"
    path: "/api/organizations/{org_id}/invitations"
    description: "Invite a user to the organization"
    request_schema: "{ email: string, role: 'admin'|'member'|'viewer' }"
    response_schema: "{ invitation: Invitation }"

  - name: "list_members"
    method: "GET"
    path: "/api/organizations/{org_id}/members"
    description: "List all members of the organization"
    request_schema: "Query params: ?role=string&search=string"
    response_schema: "{ members: [{ user: User, role: string, joined_at: datetime }] }"

  - name: "update_member_role"
    method: "PATCH"
    path: "/api/organizations/{org_id}/members/{user_id}"
    description: "Change a member's role"
    request_schema: "{ role: 'admin'|'member'|'viewer' }"
    response_schema: "{ member: Member }"

  - name: "remove_member"
    method: "DELETE"
    path: "/api/organizations/{org_id}/members/{user_id}"
    description: "Remove a member from the organization"
    request_schema: "None"
    response_schema: "{ success: true }"

  # ── Projects ───────────────────────────────────────────────────────────────
  - name: "create_project"
    method: "POST"
    path: "/api/projects"
    description: "Create a new project within an organization"
    request_schema: >
      {
        name: string,
        key: string (2-10 uppercase letters, e.g. 'PROJ'),
        description?: string,
        project_type: 'scrum'|'kanban'|'basic',
        lead_id: uuid,
        org_id: uuid,
        default_assignee_id?: uuid,
        category?: string,
        avatar_url?: string
      }
    response_schema: "{ project: Project }"

  - name: "list_projects"
    method: "GET"
    path: "/api/projects"
    description: "List all projects accessible by the user"
    request_schema: "Query params: ?org_id=uuid&search=string&archived=bool&page=int&per_page=int&sort=name|created_at|updated_at"
    response_schema: "{ projects: Project[], total: int, page: int }"

  - name: "get_project"
    method: "GET"
    path: "/api/projects/{project_id}"
    description: "Get full project details including settings and stats"
    request_schema: "Path param: project_id"
    response_schema: >
      {
        project: Project,
        stats: {
          total_issues: int,
          open_issues: int,
          closed_issues: int,
          active_sprint: Sprint | null
        }
      }

  - name: "update_project"
    method: "PATCH"
    path: "/api/projects/{project_id}"
    description: "Update project details and settings"
    request_schema: >
      {
        name?: string,
        description?: string,
        lead_id?: uuid,
        default_assignee_id?: uuid,
        category?: string,
        avatar_url?: string
      }
    response_schema: "{ project: Project }"

  - name: "delete_project"
    method: "DELETE"
    path: "/api/projects/{project_id}"
    description: "Delete a project and all its issues (admin only)"
    request_schema: "{ move_issues_to?: uuid (another project) }"
    response_schema: "{ success: true }"

  - name: "archive_project"
    method: "POST"
    path: "/api/projects/{project_id}/archive"
    description: "Archive a project (soft-delete, read-only)"
    request_schema: "None"
    response_schema: "{ project: Project }"

  - name: "restore_project"
    method: "POST"
    path: "/api/projects/{project_id}/restore"
    description: "Restore an archived project"
    request_schema: "None"
    response_schema: "{ project: Project }"

  - name: "get_project_settings"
    method: "GET"
    path: "/api/projects/{project_id}/settings"
    description: "Get project-specific settings (permissions, notifications, features)"
    request_schema: "None"
    response_schema: "{ settings: ProjectSettings }"

  - name: "update_project_settings"
    method: "PATCH"
    path: "/api/projects/{project_id}/settings"
    description: "Update project settings"
    request_schema: "{ settings: Partial<ProjectSettings> }"
    response_schema: "{ settings: ProjectSettings }"

  # ── Project Roles & Permissions ────────────────────────────────────────────
  - name: "list_project_roles"
    method: "GET"
    path: "/api/projects/{project_id}/roles"
    description: "List all roles defined for the project"
    request_schema: "None"
    response_schema: "{ roles: ProjectRole[] }"

  - name: "create_project_role"
    method: "POST"
    path: "/api/projects/{project_id}/roles"
    description: "Create a custom project role with specific permissions"
    request_schema: >
      {
        name: string,
        description?: string,
        permissions: string[] (e.g. ['issues.create', 'issues.edit', 'sprints.manage'])
      }
    response_schema: "{ role: ProjectRole }"

  - name: "assign_project_role"
    method: "POST"
    path: "/api/projects/{project_id}/roles/{role_id}/members"
    description: "Assign a user to a project role"
    request_schema: "{ user_id: uuid }"
    response_schema: "{ success: true }"

  # ── Issues (Core) ─────────────────────────────────────────────────────────
  - name: "create_issue"
    method: "POST"
    path: "/api/issues"
    description: "Create a new issue (story, task, bug, epic, sub-task)"
    request_schema: >
      {
        project_id: uuid,
        issue_type: 'epic'|'story'|'task'|'bug'|'sub_task'|'improvement'|'new_feature',
        summary: string,
        description?: string (rich text / markdown),
        priority: 'highest'|'high'|'medium'|'low'|'lowest',
        assignee_id?: uuid,
        reporter_id?: uuid,
        labels?: string[],
        components?: uuid[],
        fix_versions?: uuid[],
        affects_versions?: uuid[],
        epic_id?: uuid (link to parent epic),
        parent_id?: uuid (for sub-tasks),
        sprint_id?: uuid,
        story_points?: number,
        original_estimate?: string (e.g. '2h', '3d'),
        due_date?: date,
        environment?: string,
        custom_fields?: Record<string, any>,
        attachments?: File[],
        linked_issues?: [{ type: string, issue_id: uuid }]
      }
    response_schema: >
      {
        issue: {
          id, key (e.g. 'PROJ-123'), summary, description, issue_type,
          status, priority, assignee, reporter, labels, components,
          fix_versions, affects_versions, epic, parent, sprint,
          story_points, original_estimate, remaining_estimate,
          time_spent, due_date, environment, custom_fields,
          created_at, updated_at, resolved_at
        }
      }

  - name: "list_issues"
    method: "GET"
    path: "/api/issues"
    description: "List and filter issues across projects"
    request_schema: >
      Query params:
        ?project_id=uuid
        &type=epic|story|task|bug|sub_task
        &status=open|in_progress|in_review|done|closed
        &priority=highest|high|medium|low|lowest
        &assignee_id=uuid
        &reporter_id=uuid
        &sprint_id=uuid
        &epic_id=uuid
        &label=string
        &component_id=uuid
        &fix_version_id=uuid
        &created_after=datetime
        &created_before=datetime
        &updated_after=datetime
        &due_before=date
        &search=string (full-text search in summary & description)
        &sort=created_at|updated_at|priority|due_date|story_points
        &order=asc|desc
        &page=int
        &per_page=int
    response_schema: >
      {
        issues: Issue[],
        total: int,
        page: int,
        per_page: int
      }

  - name: "get_issue"
    method: "GET"
    path: "/api/issues/{issue_key}"
    description: "Get full issue detail by key (e.g. PROJ-123) or id"
    request_schema: "Path param: issue_key (string like 'PROJ-123' or uuid)"
    response_schema: >
      {
        issue: Issue (full detail),
        children: Issue[] (sub-tasks),
        linked_issues: LinkedIssue[],
        changelog: ChangeLogEntry[],
        comments: Comment[],
        attachments: Attachment[],
        worklogs: WorkLog[],
        watchers: User[]
      }

  - name: "update_issue"
    method: "PATCH"
    path: "/api/issues/{issue_key}"
    description: "Update any field on an issue"
    request_schema: >
      {
        summary?: string,
        description?: string,
        issue_type?: string,
        priority?: string,
        assignee_id?: uuid | null,
        labels?: string[],
        components?: uuid[],
        fix_versions?: uuid[],
        affects_versions?: uuid[],
        epic_id?: uuid | null,
        sprint_id?: uuid | null,
        story_points?: number | null,
        original_estimate?: string,
        remaining_estimate?: string,
        due_date?: date | null,
        environment?: string,
        custom_fields?: Record<string, any>
      }
    response_schema: "{ issue: Issue }"

  - name: "delete_issue"
    method: "DELETE"
    path: "/api/issues/{issue_key}"
    description: "Permanently delete an issue and all sub-tasks"
    request_schema: "Query param: ?delete_subtasks=bool (default true)"
    response_schema: "{ success: true }"

  - name: "transition_issue"
    method: "POST"
    path: "/api/issues/{issue_key}/transitions"
    description: "Move an issue to a new status via workflow transition"
    request_schema: >
      {
        transition_id: uuid,
        resolution?: 'done'|'wont_do'|'duplicate'|'cannot_reproduce'|'incomplete',
        comment?: string,
        fields?: Record<string, any> (fields required by the transition screen)
      }
    response_schema: "{ issue: Issue }"

  - name: "get_available_transitions"
    method: "GET"
    path: "/api/issues/{issue_key}/transitions"
    description: "List available workflow transitions for the issue's current status"
    request_schema: "None"
    response_schema: >
      {
        transitions: [
          {
            id, name, to_status: { id, name, category },
            required_fields?: FieldDef[],
            conditions_met: bool
          }
        ]
      }

  - name: "assign_issue"
    method: "PUT"
    path: "/api/issues/{issue_key}/assignee"
    description: "Assign or unassign a user to/from an issue"
    request_schema: "{ assignee_id: uuid | null }"
    response_schema: "{ issue: Issue }"

  - name: "bulk_update_issues"
    method: "POST"
    path: "/api/issues/bulk"
    description: "Perform bulk operations on multiple issues"
    request_schema: >
      {
        issue_keys: string[],
        action: 'transition'|'update'|'delete'|'move',
        fields?: Record<string, any>,
        transition_id?: uuid,
        target_project_id?: uuid
      }
    response_schema: >
      {
        success_count: int,
        error_count: int,
        errors: [{ issue_key: string, error: string }]
      }

  - name: "move_issue"
    method: "POST"
    path: "/api/issues/{issue_key}/move"
    description: "Move an issue to a different project"
    request_schema: "{ target_project_id: uuid, target_issue_type?: string }"
    response_schema: "{ issue: Issue (with new key) }"

  - name: "clone_issue"
    method: "POST"
    path: "/api/issues/{issue_key}/clone"
    description: "Clone an issue with optional modifications"
    request_schema: >
      {
        include_subtasks?: bool,
        include_attachments?: bool,
        include_links?: bool,
        override_fields?: Record<string, any>
      }
    response_schema: "{ issue: Issue (new clone) }"

  - name: "vote_issue"
    method: "POST"
    path: "/api/issues/{issue_key}/vote"
    description: "Vote for an issue (increases priority signal)"
    request_schema: "None"
    response_schema: "{ votes: int }"

  - name: "unvote_issue"
    method: "DELETE"
    path: "/api/issues/{issue_key}/vote"
    description: "Remove vote from an issue"
    request_schema: "None"
    response_schema: "{ votes: int }"

  - name: "watch_issue"
    method: "POST"
    path: "/api/issues/{issue_key}/watchers"
    description: "Add the current user (or a specified user) as a watcher"
    request_schema: "{ user_id?: uuid }"
    response_schema: "{ watchers: User[] }"

  - name: "unwatch_issue"
    method: "DELETE"
    path: "/api/issues/{issue_key}/watchers/{user_id}"
    description: "Remove a watcher from an issue"
    request_schema: "None"
    response_schema: "{ success: true }"

  - name: "list_watchers"
    method: "GET"
    path: "/api/issues/{issue_key}/watchers"
    description: "List all watchers of an issue"
    request_schema: "None"
    response_schema: "{ watchers: User[] }"

  # ── Issue Links ────────────────────────────────────────────────────────────
  - name: "create_issue_link"
    method: "POST"
    path: "/api/issue-links"
    description: "Create a link between two issues"
    request_schema: >
      {
        link_type: 'blocks'|'is_blocked_by'|'clones'|'is_cloned_by'|
                   'duplicates'|'is_duplicated_by'|'relates_to'|
                   'causes'|'is_caused_by'|'is_child_of'|'is_parent_of',
        inward_issue_key: string,
        outward_issue_key: string,
        comment?: string
      }
    response_schema: "{ link: IssueLink }"

  - name: "delete_issue_link"
    method: "DELETE"
    path: "/api/issue-links/{link_id}"
    description: "Remove a link between two issues"
    request_schema: "None"
    response_schema: "{ success: true }"

  - name: "list_link_types"
    method: "GET"
    path: "/api/issue-link-types"
    description: "List all available issue link types"
    request_schema: "None"
    response_schema: "{ link_types: IssueLinkType[] }"

  # ── Comments ───────────────────────────────────────────────────────────────
  - name: "add_comment"
    method: "POST"
    path: "/api/issues/{issue_key}/comments"
    description: "Add a comment to an issue"
    request_schema: >
      {
        body: string (rich text / markdown),
        visibility?: { type: 'role'|'group', value: string },
        mentions?: uuid[]
      }
    response_schema: "{ comment: Comment }"

  - name: "list_comments"
    method: "GET"
    path: "/api/issues/{issue_key}/comments"
    description: "List all comments on an issue"
    request_schema: "Query params: ?order=asc|desc&page=int&per_page=int"
    response_schema: "{ comments: Comment[], total: int }"

  - name: "update_comment"
    method: "PUT"
    path: "/api/issues/{issue_key}/comments/{comment_id}"
    description: "Edit an existing comment"
    request_schema: "{ body: string, visibility?: Visibility }"
    response_schema: "{ comment: Comment }"

  - name: "delete_comment"
    method: "DELETE"
    path: "/api/issues/{issue_key}/comments/{comment_id}"
    description: "Delete a comment"
    request_schema: "None"
    response_schema: "{ success: true }"

  # ── Attachments ────────────────────────────────────────────────────────────
  - name: "upload_attachment"
    method: "POST"
    path: "/api/issues/{issue_key}/attachments"
    description: "Upload one or more file attachments to an issue"
    request_schema: "multipart/form-data: files[] (max 25MB each)"
    response_schema: "{ attachments: Attachment[] }"

  - name: "get_attachment"
    method: "GET"
    path: "/api/attachments/{attachment_id}"
    description: "Get attachment metadata"
    request_schema: "None"
    response_schema: "{ attachment: Attachment }"

  - name: "download_attachment"
    method: "GET"
    path: "/api/attachments/{attachment_id}/content"
    description: "Download the attachment file"
    request_schema: "None"
    response_schema: "Binary file stream with Content-Disposition header"

  - name: "delete_attachment"
    method: "DELETE"
    path: "/api/attachments/{attachment_id}"
    description: "Delete an attachment"
    request_schema: "None"
    response_schema: "{ success: true }"

  # ── Work Logs (Time Tracking) ──────────────────────────────────────────────
  - name: "add_worklog"
    method: "POST"
    path: "/api/issues/{issue_key}/worklogs"
    description: "Log time spent on an issue"
    request_schema: >
      {
        time_spent: string (e.g. '2h 30m'),
        started_at: datetime,
        description?: string,
        adjust_estimate: 'auto'|'manual'|'leave',
        new_estimate?: string
      }
    response_schema: "{ worklog: WorkLog }"

  - name: "list_worklogs"
    method: "GET"
    path: "/api/issues/{issue_key}/worklogs"
    description: "List all work logs for an issue"
    request_schema: "Query params: ?author_id=uuid&page=int"
    response_schema: "{ worklogs: WorkLog[], total_time_spent: string }"

  - name: "update_worklog"
    method: "PUT"
    path: "/api/issues/{issue_key}/worklogs/{worklog_id}"
    description: "Edit a work log entry"
    request_schema: "{ time_spent?: string, started_at?: datetime, description?: string }"
    response_schema: "{ worklog: WorkLog }"

  - name: "delete_worklog"
    method: "DELETE"
    path: "/api/issues/{issue_key}/worklogs/{worklog_id}"
    description: "Delete a work log entry"
    request_schema: "None"
    response_schema: "{ success: true }"

  # ── Issue History / Changelog ──────────────────────────────────────────────
  - name: "get_issue_changelog"
    method: "GET"
    path: "/api/issues/{issue_key}/changelog"
    description: "Full audit history of all changes to an issue"
    request_schema: "Query params: ?page=int&per_page=int"
    response_schema: >
      {
        changelog: [
          {
            id, author: User, created_at: datetime,
            items: [{ field, from_value, to_value }]
          }
        ],
        total: int
      }

  # ── Sprints ────────────────────────────────────────────────────────────────
  - name: "create_sprint"
    method: "POST"
    path: "/api/boards/{board_id}/sprints"
    description: "Create a new sprint for a scrum board"
    request_schema: >
      {
        name: string,
        goal?: string,
        start_date?: datetime,
        end_date?: datetime
      }
    response_schema: "{ sprint: Sprint }"

  - name: "list_sprints"
    method: "GET"
    path: "/api/boards/{board_id}/sprints"
    description: "List all sprints for a board"
    request_schema: "Query params: ?state=future|active|closed&page=int"
    response_schema: "{ sprints: Sprint[], total: int }"

  - name: "get_sprint"
    method: "GET"
    path: "/api/sprints/{sprint_id}"
    description: "Get sprint details including issues"
    request_schema: "None"
    response_schema: >
      {
        sprint: Sprint,
        issues: Issue[],
        stats: {
          total_points: int,
          completed_points: int,
          total_issues: int,
          completed_issues: int
        }
      }

  - name: "update_sprint"
    method: "PATCH"
    path: "/api/sprints/{sprint_id}"
    description: "Update sprint details"
    request_schema: >
      {
        name?: string,
        goal?: string,
        start_date?: datetime,
        end_date?: datetime
